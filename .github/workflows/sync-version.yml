name: Sync Version – cake
on:
 repository_dispatch:
   types: [version_update]
   
permissions:
 contents: write
 pull-requests: write
 
jobs:
 sync:
   runs-on: ubuntu-latest
   steps:
     - name: Checkout repository
       uses: actions/checkout@v4
       with:
         token: ${{ secrets.PAT }}
         fetch-depth: 0
         
     - name: Load & validate version
       run: |
         VERSION="${{ github.event.client_payload.version }}"
         VERSION="${VERSION//,/\.}"
         if ! [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$ ]]; then
           echo "Invalid version: $VERSION"
           exit 1
         fi
         echo "VERSION=$VERSION" >> $GITHUB_ENV
         
     - name: Prepare release branch
       run: |
         BRANCH="release-v${VERSION}"
         echo "BRANCH=$BRANCH" >> $GITHUB_ENV
         git fetch origin
         if git ls-remote --heads origin "$BRANCH" | grep -q "$BRANCH"; then
           git checkout "$BRANCH"
           git pull origin "$BRANCH"
         else
           git checkout -b "$BRANCH"
         fi
         
     - name: Sync assets
       env:
         GIT_TOKEN: ${{ secrets.PAT }}
       run: |
         git clone --depth 1 \
           "https://x-access-token:${GIT_TOKEN}@github.com/froala/wysiwyg-editor.git" \
           /tmp/wysiwyg-main
         mkdir -p webroot/js
         mkdir -p webroot/css
         rsync -av --delete /tmp/wysiwyg-main/js/ webroot/js/
         rsync -av --delete /tmp/wysiwyg-main/css/ webroot/css/
         
     - name: Commit & push
       run: |
         git config user.name "froala-travis-bot"
         git config user.email "froala_git_travis_bot@idera.com"
         git add webroot/js webroot/css
         git commit -m "chore: release v${VERSION}" || echo "Nothing to commit"
         git push origin "$BRANCH"
         
     - name: Create Pull Request
       env:
         GH_TOKEN: ${{ secrets.PAT }}
         RELEASE_NOTES: ${{ github.event.client_payload.release_notes }}
       run: |
         git fetch origin master
         if git diff --quiet origin/master..."$BRANCH"; then
           echo "No commits between $BRANCH and master. Skipping PR creation."
           exit 0
         fi
         gh pr create \
           --base master \
           --head "$BRANCH" \
           --title "Release v${VERSION}" \
           --body "$PR_BODY"
